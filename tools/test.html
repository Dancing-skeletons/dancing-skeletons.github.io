<!doctype html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Backing track — improvisation</title>
<link href="../styles.css" rel="stylesheet"/>
<script src="https://unpkg.com/@strudel/web@1.0.3"></script>
</head>
<body>
<div id="generator">
<h1>Backing track pour improvisation</h1>
<div class="field">
    <label for="key">Tonalité</label>
    <select id="key">
        <option selected="" value="C">C</option>
        <option value="C#">C# / Db</option>
        <option value="D">D</option>
        <option value="D#">D# / Eb</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="F#">F# / Gb</option>
        <option value="G">G</option>
        <option value="G#">G# / Ab</option>
        <option value="A">A</option>
        <option value="A#">A# / Bb</option>
        <option value="B">B</option>
    </select>
</div>
<div class="field">
    <label for="progression">Grille</label>
    <select id="progression">
        <option value="pop">Pop (I - V - vi - IV)</option>
        <option value="folk">Folk (I - IV - V - IV)</option>
        <option value="blues">Blues 12 mesures</option>
        <option value="jazz">Jazz (ii - V - I)</option>
    </select>
</div>
<div class="field">
<label>Accompagnement</label>
    <label><input checked="" class="instrument" type="checkbox" value="gm_piano"/> Piano</label><br/>
    <label><input class="instrument" type="checkbox" value="gm_acoustic_guitar_steel"/> Guitare</label><br/>
    <label><input class="instrument" type="checkbox" value="gm_drawbar_organ"/> Orgue</label><br/>
    <label><input class="instrument" type="checkbox" value="gm_voice_oohs"/> Chœurs</label>
</div>
<div class="field">
    <label for="drums">Batterie</label>
    <select id="drums">
        <option value="straight">Standard</option>
        <option value="shuffle">Shuffle (blues)</option>
        <option value="ballad">Ballade (douce)</option>
    </select>
</div>
<div class="field">
    <label for="tempo">Tempo : <span class="tempo-value" id="tempo-value">120</span> bpm</label>
    <input id="tempo" max="200" min="60" step="1" type="range" value="120"/>
</div>
<div class="transport">
    <button id="play-btn">▶ Générer et jouer</button>
    <button id="stop-btn">■ Stop</button>
</div>
<div id="status"></div>
</div>
<div id="chord-grid"></div>

<script>
  initStrudel();
  document.getElementById("play-btn").addEventListener("click", async () => {

    hush();

    const key = document.getElementById("key").value;
    const progression = document.getElementById("progression").value;
    const bpm = parseInt(document.getElementById("tempo").value);

    const chords = buildChords(key, progression);

    renderChordGrid(chords);
    startSync(bpm);

    setcpm(bpm / 4);

    await samples("github:tidalcycles/Dirt-Samples/master");

    const instruments =
        [...document.querySelectorAll(".instrument:checked")]
            .map(i => i.value);

    const chordPattern =
        `<${chords.join(" ")}>`;
    
    instruments.forEach(inst =>

        chord(chordPattern)
            .dict("ireal-ext")
            .anchor("C5")
            .voicing()
            .s(inst)
            .release(.2)
            .gain(.6)
            .play()

    );
    chord(chordPattern)
        .rootNotes("1,2")
        .struct("x*2")
        .s("gm_acoustic_bass")
        .gain(1)
        .play();

      eval(DRUM_PATTERNS[
        document.getElementById("drums").value
    ]).play();

    document.getElementById("stop-btn").addEventListener("click", () => {
    hush();
    stopSync();});
</script>
